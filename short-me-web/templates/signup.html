<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | Short Me</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='main.js') }}"></script>

</head>
<body>
    
    <div class="alert"><h1 id="alert"></h1></div>

    <div class="login">
        <h1>Signup</h1>
        <div class="img"><img style="border-radius: 100px;" src="{{ url_for('static', filename='logo.png') }}" alt="logo" width="100" height="100"><h2><a target="_blank" style="color: white;text-decoration: none;" href="https://github.com/melgiri/short-me">Short Me</a></h2></div>
        <input type="text" name="username" id="username" placeholder="Username"><br><br>
        <input type="password" name="password" id="password" placeholder="Password"><br><br>
        <button id="login" onclick="login()">Signup</button>
    </div>
    
    <script>
        function login() {
            var uname = document.getElementById('username').value;
            var pass = document.getElementById('password').value;
            rec("uname=" + uname + "&pass=" + pass, "/api/signup");
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4) {
                    if(xhr.status == 200 && xhr.responseText == "ok"){
                            window.location.href = "/";
                        }else {
                        al("Username already exists!");
                    }
                }
            };
            }
        function al(msg) {
            document.getElementById('alert').innerHTML = msg;
        }
    </script>

</body>
</html>
