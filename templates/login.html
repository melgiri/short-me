<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="static/logo.png" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        *{
            background-color: black;
        }
        .Login{
            text-align: center;
            color: white;
        }
        input::placeholder{
            color: white;
        }
        input{
            color: white;
            width: 300px;
            height: 30px;
            border-radius: 5px;
            border-color: white;
        }
        button{
            width: 60px;
            height: 30px;
            border-radius: 5px;
            border-color: white;
            background-color: none;
            color: white;
        }
        .alert{
            border-radius: 5px;
            border: none;
            color: red;
            text-align: center;
        }
        .img{
            text-align: center;
        }
        img{
            border-radius: 100%;
        }
        a{
            color: white;
            text-decoration: underline;
        }
    </style>

</head>
<body>
    
    <div class="alert"><h1 id="alert"></h1></div>

    <div class="Login">
        <h1>Login</h1>
        <div class="img"><img src="static/logo.png" alt="logo" width="100" height="100"><h2><a target="_blank" href="https://github.com/melgiri/short-me">Short Me</a></h2></div>
        <input type="text" name="username" id="username" placeholder="Username"><br><br>
        <input type="password" name="password" id="password" placeholder="Password"><br><br>
        <button id="login" onclick="login()">Login</button>
    </div>
    
    <script>
        function login() {
            var uname = document.getElementById('username').value;
            var pass = document.getElementById('password').value;

            var xhr = new XMLHttpRequest();

            xhr.open("POST", "/login", true);
            xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
            xhr.send("uname=" + uname + "&pass=" + pass);
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4) {
                    if(xhr.status == 200 && xhr.responseText == "ok"){
                            window.location.href = "/";
                        }else {
                        al("Invalid ID or Password");
                    }
                }
            };
            }
        function al(msg) {
            document.getElementById('alert').innerHTML = msg;
        }
    </script>

</body>
</html>
